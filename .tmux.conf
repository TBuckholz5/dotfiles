unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Copy.
set-window-option -g mode-keys vi
set-hook -g pane-mode-changed { if -F "#{pane_in_mode}" "selectp -P bg=#181818" "selectp -P default" }
# Vi-style copy mode keybindings
bind [ copy-mode \; send-keys -X start-of-line
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane


# Sessions.
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
bind-key j run-shell "tmux switch-client -t chalk-private"
bind-key h run-shell "tmux switch-client -t whatnot"
bind-key ';' run-shell "tmux switch-client -t alloy-repro"
bind-key l run-shell "tmux switch-client -t dotfiles"
bind-key k run-shell "tmux switch-client -t notes"
# Session switcher with sesh - shows all sessions, zoxide dirs, and more
bind-key "T" run-shell "sesh connect \"$(
  sesh list -tcd --icons | grep -v 'scratch-' | fzf-tmux -p 80%,70% \
    --no-sort --ansi --layout=default --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(~/dotfiles/bin/sesh-find-dirs)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
# Go to last session.
bind -N "last-session" o run-shell "~/dotfiles/bin/tmux-last-session"


# Panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# Pane resizing with leader + Arrow keys.
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
# Floating terminal (per-session + per-window, toggleable).
bind f run-shell "~/dotfiles/bin/tmux-float '#{window_index}' '#{pane_current_path}'"


unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
bind c new-window -c "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'schasse/tmux-jump'
set -g @jump-key 's'

# Theme.
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_date_time_text "%d %b %H:%M"

# Eagerly load catppuccin so module variables are available for status-right/left
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status line
set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

set -sg escape-time 10
set -g mouse on
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

run '~/.tmux/plugins/tpm/tpm'

